<h2>NgRx with Forms</h2>

<!-- Use *ngIf with async to subscribe once and store value in a template variable -->
<ng-container *ngIf="form$ | async as formData">
  <form class="formContainer" [formGroup]="form">
    <div class="form-group">
      <label for="name">Name:</label>
      <input
        type="text"
        id="name"
        formControlName="name"
        [value]="formData.name"
        (input)="updateFormField('name', $event?.target?.value)"
        [attr.aria-invalid]="form.get('name')?.invalid && form.get('name')?.touched"
        [attr.aria-describedby]="form.get('name')?.invalid && form.get('name')?.touched ? 'name-error' : null"
      />
      <!-- Validation error messages -->
      <span
        id="name-error"
        class="error-message"
        *ngIf="form.get('name')?.invalid && form.get('name')?.touched"
      >
        <small *ngIf="form.get('name')?.errors?.['required']">Name is required.</small>
        <small *ngIf="form.get('name')?.errors?.['minlength']">Name must be at least 3 characters.</small>
      </span>
    </div>

    <div class="form-group">
      <label for="email">Email:</label>
      <input
        type="email"
        id="email"
        formControlName="email"
        [value]="formData.email"
        (input)="updateFormField('email', $event?.target?.value)"
        [attr.aria-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
        [attr.aria-describedby]="form.get('email')?.invalid && form.get('email')?.touched ? 'email-error' : null"
      />
      <!-- Validation error messages -->
      <span
        id="email-error"
        class="error-message"
        *ngIf="form.get('email')?.invalid && form.get('email')?.touched"
      >
        <small *ngIf="form.get('email')?.errors?.['required']">Email is required.</small>
        <small *ngIf="form.get('email')?.errors?.['email']">Please enter a valid email address.</small>
      </span>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="form.invalid">Submit</button>
      <button type="button" (click)="resetForm()">Reset</button>
    </div>
  </form>

  <h3>Form Preview</h3>
  <div class="preview">
    <div>Name: {{ formData.name }}</div>
    <div>Email: {{ formData.email }}</div>
  </div>
</ng-container>
